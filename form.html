```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Job Application Form</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef2f7;
    padding:40px;
}

.container{
    max-width:800px;
    background:white;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.row{
    display:flex;
    gap:20px;
}

.row .form-group{
    flex:1;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#007bff;
    outline:none;
    box-shadow:0 0 5px rgba(0,123,255,0.4);
}

.password-box{
    position:relative;
}

.password-box i{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    color:#666;
}

.gender{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.skills{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:10px;
}

button{
    width:100%;
    padding:14px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.02);
}

.error{
    color:red;
    font-size:13px;
    margin-top:5px;
}

/* Popup */

.popup{
    position:fixed;
    top:20px;
    right:-400px;
    background:green;
    color:white;
    padding:15px 25px;
    border-radius:8px;
    transition:0.5s;
    z-index:1000;
}

.popup.show{
    right:20px;
}

/* Dark Mode */

.dark{
    background:#1e1e1e;
}

.dark .container{
    background:#333;
    color:white;
}

.dark input,
.dark select,
.dark textarea{
    background:#444;
    color:white;
    border:1px solid #777;
}

.dark button{
    background:#28a745;
}

.mode-btn{
    margin-bottom:20px;
    width:auto;
    padding:10px 20px;
}

</style>
</head>
<body>

<button class="mode-btn" onclick="toggleTheme()">
    Toggle Dark Mode
</button>

<div class="container">

    <h2>Job Application Form</h2>

    <form id="jobForm">

        <!-- Name -->

        <div class="row">

            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="fname" required>
                <div class="error" id="fnameError"></div>
            </div>

            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" id="lname" required>
            </div>

        </div>

        <!-- Email + Phone -->

        <div class="row">

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" required>
                <div class="error" id="phoneError"></div>
            </div>

        </div>

        <!-- Password -->

        <div class="form-group">

            <label>Password *</label>

            <div class="password-box">

                <input type="password"
                id="password" required>

                <i class="fa-solid fa-eye"
                id="togglePassword"></i>

            </div>

            <div class="error" id="passError"></div>

        </div>

        <!-- Gender -->

        <div class="form-group">

            <label>Gender *</label>

            <div class="gender">

                <label>
                    <input type="radio"
                    name="gender"> Male
                </label>

                <label>
                    <input type="radio"
                    name="gender"> Female
                </label>

                <label>
                    <input type="radio"
                    name="gender"> Other
                </label>

            </div>

        </div>

        <!-- DOB -->

        <div class="form-group">
            <label>Date of Birth *</label>
            <input type="date" required>
        </div>

        <!-- Address -->

        <div class="form-group">
            <label>Address *</label>
            <textarea rows="3" required></textarea>
        </div>

        <!-- Qualification -->

        <div class="row">

            <div class="form-group">

                <label>Qualification *</label>

                <select required>
                    <option value="">Select</option>
                    <option>B.E / B.Tech</option>
                    <option>MCA</option>
                    <option>BCA</option>
                    <option>MBA</option>
                    <option>B.Sc</option>
                </select>

            </div>

            <div class="form-group">

                <label>Experience *</label>

                <select required>
                    <option value="">Select</option>
                    <option>Fresher</option>
                    <option>1 Year</option>
                    <option>2 Years</option>
                    <option>3+ Years</option>
                </select>

            </div>

        </div>

        <!-- Skills -->

        <div class="form-group">

            <label>Skills *</label>

            <div class="skills">

                <label><input type="checkbox"> HTML</label>
                <label><input type="checkbox"> CSS</label>
                <label><input type="checkbox"> JavaScript</label>
                <label><input type="checkbox"> React</label>
                <label><input type="checkbox"> Python</label>

            </div>

        </div>

        <!-- Resume -->

        <div class="form-group">
            <label>Upload Resume *</label>
            <input type="file" required>
        </div>

        <!-- Position -->

        <div class="form-group">

            <label>Applying Position *</label>

            <select id="position" required>

                <option value="">Select Position</option>

                <option value="developer">
                    Web Developer
                </option>

                <option value="designer">
                    UI/UX Designer
                </option>

                <option value="tester">
                    Software Tester
                </option>

            </select>

        </div>

        <!-- Dynamic Area -->

        <div class="form-group" id="dynamicField"></div>

        <!-- Submit -->

        <button type="submit">
            Submit Application
        </button>

    </form>

</div>

<!-- Popup -->

<div class="popup" id="popup">
    Application Submitted Successfully ✅
</div>

<script>

// Password Toggle

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";

        this.classList.remove("fa-eye");
        this.classList.add("fa-eye-slash");

    } else {

        password.type = "password";

        this.classList.remove("fa-eye-slash");
        this.classList.add("fa-eye");

    }

});


// Dynamic Field

const position =
document.getElementById("position");

const dynamicField =
document.getElementById("dynamicField");

position.addEventListener("change", function(){

    if(this.value === "developer"){

        dynamicField.innerHTML = `
            <label>GitHub Profile *</label>
            <input type="url"
            placeholder="Enter GitHub URL" required>
        `;
    }

    else if(this.value === "designer"){

        dynamicField.innerHTML = `
            <label>Portfolio Link *</label>
            <input type="url"
            placeholder="Enter Portfolio URL" required>
        `;
    }

    else if(this.value === "tester"){

        dynamicField.innerHTML = `
            <label>Testing Tools *</label>
            <input type="text"
            placeholder="Selenium, JMeter" required>
        `;
    }

    else{

        dynamicField.innerHTML = "";

    }

});


// Form Validation

document.getElementById("jobForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let valid = true;

    // Clear Errors

    document.getElementById("fnameError")
    .innerText = "";

    document.getElementById("emailError")
    .innerText = "";

    document.getElementById("phoneError")
    .innerText = "";

    document.getElementById("passError")
    .innerText = "";

    // Name Validation

    const fname =
    document.getElementById("fname")
    .value.trim();

    if(fname.length < 3){

        document.getElementById("fnameError")
        .innerText =
        "Minimum 3 characters required";

        valid = false;
    }

    // Email Validation

    const email =
    document.getElementById("email")
    .value.trim();

    if(!email.includes("@")){

        document.getElementById("emailError")
        .innerText =
        "Invalid email address";

        valid = false;
    }

    // Phone Validation

    const phone =
    document.getElementById("phone")
    .value.trim();

    if(phone.length < 10){

        document.getElementById("phoneError")
        .innerText =
        "Invalid phone number";

        valid = false;
    }

    // Password Validation

    if(password.value.length < 6){

        document.getElementById("passError")
        .innerText =
        "Password minimum 6 characters";

        valid = false;
    }

    // Success Popup

    if(valid){

        const popup =
        document.getElementById("popup");

        popup.classList.add("show");

        setTimeout(() => {

            popup.classList.remove("show");

        }, 3000);

        document.getElementById("jobForm")
        .reset();

        dynamicField.innerHTML = "";

    }

});


// Dark Mode

function toggleTheme(){

    document.body.classList.toggle("dark");

}

</script>

</body>
</html>
```
